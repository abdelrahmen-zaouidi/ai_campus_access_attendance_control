<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le cours</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles_edit.css') }}">
    <script src="{{ url_for('static', filename='scripts_edit.js') }}" defer></script>
</head>
<body>
    <div class="container">
        <h2>Modifier le cours</h2>
        <form action="{{ url_for('edit_course', course_id=course.id) }}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- Name and Surname Side-by-Side -->
            <div class="form-row">
                <div>
                    <label for="first_name">Prénom:</label>
                    <input type="text" id="first_name" name="first_name" value="{{ course.first_name }}" required>
                </div>
                <div>
                    <label for="last_name">Nom:</label>
                    <input type="text" id="last_name" name="last_name" value="{{ course.last_name }}" required>
                </div>
            </div>

            <label for="photo">Photo:</label>
            <input type="file" id="photo" name="photo" accept="image/*">

            <label for="nom_salle">Salle:</label>
            <input type="text" id="nom_salle" name="nom_salle" value="{{ course.room_name }}" required>

            <label for="date_cours">Date du cours:</label>
            <input type="date" id="date_cours" name="date_cours" value="{{ course.course_date }}" required>

            <!-- Heure de début and Heure de fin Side-by-Side -->
            <div class="form-row time-fields">
                <div>
                    <label for="heure_debut">Heure de début:</label>
                    <input type="time" id="heure_debut" name="heure_debut" value="{{ course.start_time }}" required>
                </div>
                <div>
                    <label for="heure_fin">Heure de fin:</label>
                    <input type="time" id="heure_fin" name="heure_fin" value="{{ course.end_time }}" required>
                </div>
            </div>

            <button type="submit">Enregistrer les modifications</button>
        </form>

        <div class="button-container">
            <a href="{{ url_for('add_teacher_course') }}">
                <button type="button">Nouveau cours</button>
            </a>
            <a href="{{ url_for('view_courses') }}">
                <button type="button">Liste des cours</button>
            </a>
        </div>
    </div>
</body>
</html>
