<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un cours</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='scripts.js') }}" defer></script>
</head>
<body>
    <div class="container">
        <h2>Ajouter un cours</h2>
        <form action="{{ url_for('add_teacher_course') }}" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-row">
                <div>
                    <label for="first_name">Prénom:</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Entrez le prénom" required>
                </div>
                <div>
                    <label for="last_name">Nom:</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Entrez le nom" required>
                </div>
            </div>

            <label for="photo">Photo:</label>
            <input type="file" id="photo" name="photo" accept="image/*" required>

            <label for="nom_salle">Salle:</label>
            <input type="text" id="nom_salle" name="nom_salle" placeholder="Ex. Salle 101" required>

            <label for="date_cours">Date du cours:</label>
            <input type="date" id="date_cours" name="date_cours" required>

            <div class="form-row time-fields">
                <div>
                    <label for="heure_debut">Heure de début:</label>
                    <input type="time" id="heure_debut" name="heure_debut" required>
                </div>
                <div>
                    <label for="heure_fin">Heure de fin:</label>
                    <input type="time" id="heure_fin" name="heure_fin" required>
                </div>
            </div>             

            <button type="submit">Ajouter le cours</button>
        </form>

        <div class="button-container">
            <a href="{{ url_for('view_courses') }}" class="add-course-btn">Liste des cours</a>
            <a href="{{ url_for('upload_csv') }}" class="add-course-btn">Importer des cours</a>
            <a href="{{ url_for('get_logs') }}" class="add-course-btn">historique d'acces</a>
        </div>

    </div>
</body>
</html>
